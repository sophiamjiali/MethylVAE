# =====| Optuna Hyperparameter Sweep |=========================================

# Path to the input training data
project_data_dir: data/training/methylation
training_data_dir: data/training/methylation

# Path to the study and experiment save directory
experiment_dir: experiments/beta_vae
checkpoint_dir: models/beta_vae

# Split Data paths
train_adata_path: "data/training/methylation/pancancer_train_adata.h5ad"
val_adata_path: "data/training/methylation/pancancer_val_adata.h5ad"
test_adata_path: "data/training/methylation/pancancer_test_adata.h5ad"

# -----| Fixed Parameters |----------------------------------------------------

# Input AnnData object dimension (number of genes)
input_dim: 169747

# Device parameters
num_workers: 2

# Max training epochs
max_epochs: 300

# -----| Sweep Parameters |----------------------------------------------------

encoder_dims: [2048, 512, 128]
batch_size: 64
latent_dim: 64
beta: 0.01126
lr: 0.00047
input_dropout: 0.281
num_cycles: 2
