# ==============================================================================
# Config:       search_space.yaml
# Purpose:      Optuna sweep search space for BetaVAE hyperparam. optimisation.
# ==============================================================================

encoder_dims:
  - [1024, 256, 128]
  - [2048, 512, 128]
  - [2048, 1024, 256, 128]

latent_dim: [128, 256]   # suggest_int; samples integers in [128, 256]

beta: [0.001, 0.02]      # suggest_float, log=True

lr: [0.0001, 0.01]       # suggest_float, log=True

input_dropout: [0.1, 0.3]  # suggest_float, uniform

num_cycles: [2, 4]       # suggest_categorical

batch_size: [64, 128, 256]  # suggest_categorical

# [END]