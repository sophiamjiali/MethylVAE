# ==============================================================================
# Config:       search_space.yaml
# Purpose:      Optuna sweep search space for BetaVAE hyperparam. optimisation.
# ==============================================================================

max_epochs: 200
gradient_clip_val: 1.0
n_startup_trials: 5
early_stopping:
  patience: 50
  min_delta: 1e-5

encoder_dims: [1024, 512, 256, 128] # fixed

latent_dim: [128, 256]   # suggest_int; samples integers in [128, 256]

beta: [0.0001, 0.008]      # suggest_float, log=True

lr: [0.0001, 0.001]       # suggest_float, log=True

input_dropout: 0.1  # fixed

num_cycles: 4 # fixed

batch_size: 256 # fixed

# [END]